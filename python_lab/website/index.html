<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PayFlow - Online Payment Transactions</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="hero">
        <h1>PayFlow</h1>
        <p>Simple online payment transaction portal</p>
      </header>

      <main class="grid">
        <section class="card">
          <h2>Make a Payment</h2>
          <form id="paymentForm" novalidate>
            <div class="field-row">
              <label for="fullName">Full Name</label>
              <input
                id="fullName"
                name="fullName"
                type="text"
                placeholder="John Doe"
                required
              />
            </div>

            <div class="field-row">
              <label for="email">Email</label>
              <input
                id="email"
                name="email"
                type="email"
                placeholder="john@example.com"
                required
              />
            </div>

            <div class="field-row">
              <label for="amount">Amount</label>
              <input
                id="amount"
                name="amount"
                type="number"
                min="1"
                step="0.01"
                placeholder="100.00"
                required
              />
            </div>

            <div class="field-row">
              <label for="currency">Currency</label>
              <select id="currency" name="currency" required>
                <option value="">Select Currency</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="INR">INR</option>
                <option value="GBP">GBP</option>
              </select>
            </div>

            <div class="field-row">
              <label for="method">Payment Method</label>
              <select id="method" name="method" required>
                <option value="">Select Method</option>
                <option value="Card">Card</option>
                <option value="UPI">UPI</option>
                <option value="Net Banking">Net Banking</option>
                <option value="Wallet">Wallet</option>
              </select>
            </div>

            <div class="field-row">
              <label for="cardNumber">Card Number</label>
              <input
                id="cardNumber"
                name="cardNumber"
                type="text"
                maxlength="19"
                placeholder="1234 5678 9012 3456"
              />
            </div>

            <div class="inline-fields">
              <div class="field-row">
                <label for="expiry">Expiry</label>
                <input
                  id="expiry"
                  name="expiry"
                  type="text"
                  maxlength="5"
                  placeholder="MM/YY"
                />
              </div>

              <div class="field-row">
                <label for="cvv">CVV</label>
                <input
                  id="cvv"
                  name="cvv"
                  type="password"
                  maxlength="4"
                  placeholder="123"
                />
              </div>
            </div>

            <div class="field-row">
              <label for="qrImage">Upload QR Image (optional)</label>
              <input id="qrImage" name="qrImage" type="file" accept="image/*" />
              <small class="upload-hint"
                >Accepted formats: image files only.</small
              >
              <img id="qrPreview" class="qr-preview" alt="QR preview" />
            </div>

            <button type="submit" class="btn">Pay Now</button>
            <p id="status" class="status" aria-live="polite"></p>
          </form>
        </section>

        <section class="card">
          <h2>Recent Transactions</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Amount</th>
                  <th>Method</th>
                  <th>Status</th>
                  <th>Time</th>
                </tr>
              </thead>
              <tbody id="transactionBody">
                <tr>
                  <td colspan="6" class="empty">No transactions yet.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
