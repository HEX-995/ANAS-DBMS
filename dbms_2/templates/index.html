<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapBase CRUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="bg-grid"></div>
    <main class="layout">
      <section class="hero">
        <p class="kicker">Python + SQL</p>
        <h1>SnapBase Manager</h1>
        <p class="sub">
          Create, update, delete, and view users with profile photos.
        </p>
      </section>

      <section class="panel form-panel">
        <h2 id="form-title">Create User</h2>
        <form id="user-form">
          <input type="hidden" id="user-id" />

          <label for="name">Full Name</label>
          <input id="name" type="text" required />

          <label for="email">Email</label>
          <input id="email" type="email" required />

          <label for="phone">Phone</label>
          <input id="phone" type="text" required />

          <label for="image">Profile Image</label>
          <input id="image" type="file" accept="image/*" />
          <img id="preview-image" alt="preview" hidden />

          <div class="actions">
            <button type="submit" class="btn btn-primary">Save</button>
            <button type="button" id="cancel-btn" class="btn btn-ghost" hidden>
              Cancel Edit
            </button>
          </div>
        </form>
        <p id="message" class="message"></p>
      </section>

      <section class="panel list-panel">
        <div class="list-head">
          <h2>Users</h2>
          <button id="refresh-btn" class="btn btn-ghost">Refresh</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Photo</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="user-table"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
