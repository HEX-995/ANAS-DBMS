    <h1>Result Page</h1>

    <div>
      <form action="backend.php">
        <label for="name">Name:</label>
        <input type="text" name="name" id="name" /><br /><br />
        <label for="roll">Roll No:</label>
        <input name="rollno" id="roll" /><br /><br />
        <label for="D.O.B">D.O.B:</label>
        <input type="date" name="dob" id="D.O.B" /><br /><br />
        <label for="gend">Gender:</label>
        <span>Male</span><input type="radio" id="gend" />

        <span>Other</span><input type="radio" id="gend" /><br /><br />
