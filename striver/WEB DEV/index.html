<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Netflix UI Clone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" class="logo" alt="Netflix Logo" />
    <nav>
      <ul>
        <li>Home</li>
        <li>TV Shows</li>
        <li>Movies</li>
        <li>Games</li>
        <li>New & Popular</li>
        <li>My List</li>
        <li>Browse by Languages</li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="category">
      <h2>Because you added My Demon to your List</h2>
      <div class="row">
        <img src="https://i.pinimg.com/736x/8c/d1/8c/8cd18ce933189fb7b429200b9dc7ec4a.jpg" alt="Movie 1" />
        <img src="https://i.pinimg.com/736x/5b/0a/cb/5b0acb4027895c97c29d88b21dc69a0d.jpg" alt="Movie 2" />
        <img src="https://i.pinimg.com/736x/39/97/08/3997086ee66bdc5b766939ea11ac0cd3.jpg" alt="Movie 3" />
        <img src="https://i.imgur.com/4.jpg" alt="Movie 4" />
      </div>
    </section>

    <section class="category">
      <h2>Continue Watching</h2>
      <div class="row">
        <img src="https://i.imgur.com/5.jpg" alt="Show 1" />
        <img src="https://i.imgur.com/6.jpg" alt="Show 2" />
        <img src="https://i.imgur.com/7.jpg" alt="Show 3" />
      </div>
    </section>

    <section class="category">
      <h2>Popular Mobile Games</h2>
      <div class="row">
        <img src="https://i.imgur.com/a1.jpg" alt="Game 1" />
        <img src="https://i.imgur.com/a2.jpg" alt="Game 2" />
        <img src="https://i.imgur.com/a3.jpg" alt="Game 3" />
        <img src="https://i.imgur.com/a4.jpg" alt="Game 4" />
      </div>
    </section>
  </main>
</body>
</html>
